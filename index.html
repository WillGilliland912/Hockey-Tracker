<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <meta name="theme-color" content="#000000">
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%23000' width='180' height='180'/><text x='50%' y='50%' font-size='80' fill='%23fff' text-anchor='middle' dominant-baseline='middle' font-weight='bold'>🏒</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%23000' width='180' height='180'/><text x='50%' y='50%' font-size='80' fill='%23fff' text-anchor='middle' dominant-baseline='middle' font-weight='bold'>🏒</text></svg>">
    <title>Hockey Tracker</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body, #root {
            width: 100%;
            height: 100%;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: white;
            color: #000;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }
        .container {
            min-height: 100vh;
            padding: 16px;
            padding-bottom: 32px;
        }
        .center {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .max-w-md {
            max-width: 28rem;
            width: 100%;
        }
        h1 {
            font-size: 30px;
            font-weight: bold;
            margin-bottom: 32px;
            text-align: center;
        }
        h2 {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 16px;
        }
        h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        p {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }
        input, select {
            width: 100%;
            border: 1px solid #ddd;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            margin-bottom: 12px;
            font-family: inherit;
            -webkit-appearance: none;
            appearance: none;
        }
        select {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 8px center;
            background-size: 1.5em 1.5em;
            padding-right: 2.5rem;
        }
        button {
            padding: 12px 16px;
            border-radius: 6px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.2s;
            -webkit-appearance: none;
            appearance: none;
        }
        button:active {
            opacity: 0.8;
        }
        .btn-primary {
            background: black;
            color: white;
            width: 100%;
        }
        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: #f3f3f3;
            color: black;
            width: 100%;
            border: 1px solid #ddd;
        }
        .btn-blue {
            background: #3b82f6;
            color: white;
            flex: 1;
        }
        .btn-orange {
            background: #f97316;
            color: white;
            flex: 1;
        }
        .btn-small {
            padding: 8px 12px;
            font-size: 13px;
        }
        .btn-danger {
            color: #dc2626;
            background: none;
            border: none;
            padding: 0;
            width: auto;
        }
        .space-y-3 > * + * {
            margin-top: 12px;
        }
        .space-y-2 > * + * {
            margin-top: 8px;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .grid-2-btn {
            display: flex;
            gap: 8px;
        }
        .grid-2-btn button {
            flex: 1;
        }
        .border-t {
            border-top: 1px solid #e5e5e5;
            padding-top: 16px;
        }
        .border-b {
            border-bottom: 1px solid #e5e5e5;
            padding-bottom: 16px;
            margin-bottom: 24px;
        }
        .border {
            border: 1px solid #ddd;
        }
        .rounded {
            border-radius: 6px;
        }
        .p-2 {
            padding: 8px;
        }
        .p-3 {
            padding: 12px;
        }
        .p-4 {
            padding: 16px;
        }
        .mb-2 { margin-bottom: 8px; }
        .mb-3 { margin-bottom: 12px; }
        .mb-4 { margin-bottom: 16px; }
        .mb-6 { margin-bottom: 24px; }
        .mb-8 { margin-bottom: 32px; }
        .mt-2 { margin-top: 8px; }
        .text-center {
            text-align: center;
        }
        .text-sm {
            font-size: 13px;
        }
        .text-xs {
            font-size: 12px;
        }
        .text-gray-600 {
            color: #666;
        }
        .text-blue-600 {
            color: #2563eb;
        }
        .text-orange-600 {
            color: #ea580c;
        }
        .font-bold {
            font-weight: bold;
        }
        .font-semibold {
            font-weight: 600;
        }
        .bg-gray-50 {
            background: #fafafa;
        }
        .bg-gray-100 {
            background: #f3f3f3;
        }
        .bg-blue-50 {
            background: #eff6ff;
        }
        .bg-blue-100 {
            background: #dbeafe;
        }
        .bg-orange-50 {
            background: #fff7ed;
        }
        .bg-orange-100 {
            background: #ffedd5;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 8px;
            padding: 24px;
            max-width: 28rem;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .flex {
            display: flex;
        }
        .flex-col {
            flex-direction: column;
        }
        .gap-2 {
            gap: 8px;
        }
        .gap-4 {
            gap: 16px;
        }
        .justify-between {
            justify-content: space-between;
        }
        .items-center {
            align-items: center;
        }
        .items-start {
            align-items: flex-start;
        }
        .flex-1 {
            flex: 1;
        }
        table {
            width: 100%;
            font-size: 11px;
            border-collapse: collapse;
        }
        th, td {
            padding: 4px;
            text-align: left;
            border-bottom: 1px solid #e5e5e5;
        }
        th {
            font-weight: 600;
        }
        .text-center-col {
            text-align: center;
        }
        .truncate {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .max-h-60 {
            max-height: 240px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .text-4xl {
            font-size: 36px;
        }
        .text-2xl {
            font-size: 22px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const Storage = {
            save: (key, data) => {
                try {
                    localStorage.setItem('hgt_' + key, JSON.stringify(data));
                } catch (e) {
                    console.error('Storage error:', e);
                }
            },
            load: (key, defaultValue) => {
                try {
                    const item = localStorage.getItem('hgt_' + key);
                    return item ? JSON.parse(item) : defaultValue;
                } catch (e) {
                    console.error('Storage error:', e);
                    return defaultValue;
                }
            }
        };

        function HockeyGameTracker() {
            const [screen, setScreen] = useState('gameInfo');
            const [gameInfo, setGameInfo] = useState(() => Storage.load('gameInfo', { homeTeam: '', awayTeam: '', gameStartTime: '' }));
            
            const [rosters, setRosters] = useState(() => Storage.load('rosters', {
                home: [],
                away: [],
                homeGoalie: { name: '', number: '' },
                awayGoalie: { name: '', number: '' }
            }));

            const [signInInput, setSignInInput] = useState({ name: '', team: '', number: '' });
            const [goals, setGoals] = useState(() => Storage.load('goals', []));

            const [goalStep, setGoalStep] = useState(null);
            const [goalData, setGoalData] = useState({
                time: '',
                period: '',
                scoringTeam: '',
                scorer: null,
                assists: []
            });
            const [editingGoalIndex, setEditingGoalIndex] = useState(null);

            const formatTime = (input) => {
                const digits = input.replace(/\D/g, '');
                if (digits.length === 0) return '';
                if (digits.length === 1) return digits;
                if (digits.length === 2) return digits;
                if (digits.length === 3) return digits[0] + ':' + digits.slice(1);
                return digits.slice(0, 2) + ':' + digits.slice(2, 4);
            };

            const handleGameInfoSubmit = () => {
                if (gameInfo.homeTeam && gameInfo.awayTeam && gameInfo.gameStartTime) {
                    Storage.save('gameInfo', gameInfo);
                    setScreen('rosterSignIn');
                }
            };

            const addToTeam = (teamColor) => {
                if (!signInInput.name || !signInInput.number) return;
                
                const isGoalie = signInInput.team === '';
                const team = teamColor === 'blue' ? 'home' : 'away';
                
                if (isGoalie) {
                    const newRosters = {
                        ...rosters,
                        [`${team}Goalie`]: { name: signInInput.name, number: signInInput.number }
                    };
                    setRosters(newRosters);
                    Storage.save('rosters', newRosters);
                } else {
                    const updatedRoster = [...rosters[team], { name: signInInput.name, team: signInInput.team, number: signInInput.number }];
                    const newRosters = {
                        ...rosters,
                        [team]: updatedRoster
                    };
                    setRosters(newRosters);
                    Storage.save('rosters', newRosters);
                }
                
                setSignInInput({ name: '', team: '', number: '' });
            };

            const handleKeyPress = (e) => {
                if (e.key === 'Enter') {
                    addToTeam('blue');
                }
            };

            const startGame = () => {
                if (rosters.home.length > 0 && rosters.homeGoalie.name && rosters.away.length > 0 && rosters.awayGoalie.name) {
                    setScreen('game');
                }
            };

            const getRoster = (team) => {
                return rosters[team];
            };

            const getTeamName = (team) => {
                return team === 'home' ? gameInfo.homeTeam : gameInfo.awayTeam;
            };

            const startAddGoal = () => {
                setGoalStep(1);
                setGoalData({
                    time: '',
                    period: '',
                    scoringTeam: '',
                    scorer: null,
                    assists: []
                });
                setEditingGoalIndex(null);
            };

            const handleGoalStep = (step) => {
                if (step === 1) {
                    if (goalData.time && goalData.period) {
                        setGoalStep(2);
                    }
                } else if (step === 2) {
                    if (goalData.scoringTeam) {
                        setGoalStep(3);
                    }
                } else if (step === 3) {
                    if (goalData.scorer !== null) {
                        setGoalStep(4);
                    }
                } else if (step === 4) {
                    submitGoal();
                }
            };

            const submitGoal = () => {
                if (editingGoalIndex !== null) {
                    const updatedGoals = [...goals];
                    updatedGoals[editingGoalIndex] = goalData;
                    setGoals(updatedGoals);
                    Storage.save('goals', updatedGoals);
                    setEditingGoalIndex(null);
                } else {
                    const newGoals = [...goals, goalData];
                    setGoals(newGoals);
                    Storage.save('goals', newGoals);
                }
                setGoalStep(null);
                setGoalData({
                    time: '',
                    period: '',
                    scoringTeam: '',
                    scorer: null,
                    assists: []
                });
            };

            const editGoal = (index) => {
                setGoalData(goals[index]);
                setEditingGoalIndex(index);
                setGoalStep(4);
            };

            const deleteGoal = (index) => {
                const updatedGoals = goals.filter((_, i) => i !== index);
                setGoals(updatedGoals);
                Storage.save('goals', updatedGoals);
            };

            const toggleAssist = (playerIndex) => {
                if (goalData.assists.includes(playerIndex)) {
                    setGoalData({
                        ...goalData,
                        assists: goalData.assists.filter(a => a !== playerIndex)
                    });
                } else if (goalData.assists.length < 2) {
                    setGoalData({
                        ...goalData,
                        assists: [...goalData.assists, playerIndex]
                    });
                }
            };

            const removePlayer = (team, index) => {
                const updatedRoster = rosters[team].filter((_, i) => i !== index);
                const newRosters = {
                    ...rosters,
                    [team]: updatedRoster
                };
                setRosters(newRosters);
                Storage.save('rosters', newRosters);
            };

            const clearGameData = () => {
                if (window.confirm('Clear all game data and start over?')) {
                    localStorage.clear();
                    setGameInfo({ homeTeam: '', awayTeam: '', gameStartTime: '' });
                    setRosters({
                        home: [],
                        away: [],
                        homeGoalie: { name: '', number: '' },
                        awayGoalie: { name: '', number: '' }
                    });
                    setGoals([]);
                    setScreen('gameInfo');
                }
            };

            // GAME INFO SCREEN
            if (screen === 'gameInfo') {
                return (
                    <div className="container center">
                        <div className="max-w-md">
                            <h1>Hockey Game</h1>

                            <div className="space-y-3 mb-8">
                                <input
                                    type="text"
                                    placeholder="Home Team"
                                    value={gameInfo.homeTeam}
                                    onChange={(e) => setGameInfo({ ...gameInfo, homeTeam: e.target.value })}
                                    autoFocus
                                />
                                <input
                                    type="text"
                                    placeholder="Away Team"
                                    value={gameInfo.awayTeam}
                                    onChange={(e) => setGameInfo({ ...gameInfo, awayTeam: e.target.value })}
                                />
                                <input
                                    type="time"
                                    value={gameInfo.gameStartTime}
                                    onChange={(e) => setGameInfo({ ...gameInfo, gameStartTime: e.target.value })}
                                />
                            </div>

                            <button
                                onClick={handleGameInfoSubmit}
                                disabled={!gameInfo.homeTeam || !gameInfo.awayTeam || !gameInfo.gameStartTime}
                                className="btn-primary"
                            >
                                Next
                            </button>
                        </div>
                    </div>
                );
            }

            // ROSTER SIGN IN
            if (screen === 'rosterSignIn') {
                return (
                    <div className="container">
                        <h2>Sign In</h2>
                        <p className="text-gray-600 text-sm mb-6">Leave "Team" blank if you're the goalie</p>

                        <div className="border-b">
                            <div className="space-y-3">
                                <input
                                    type="text"
                                    placeholder="Name"
                                    value={signInInput.name}
                                    onChange={(e) => setSignInInput({ ...signInInput, name: e.target.value })}
                                    onKeyPress={handleKeyPress}
                                    autoFocus
                                />
                                <input
                                    type="text"
                                    placeholder="Team (leave blank for goalie)"
                                    value={signInInput.team}
                                    onChange={(e) => setSignInInput({ ...signInInput, team: e.target.value })}
                                    onKeyPress={handleKeyPress}
                                />
                                <input
                                    type="number"
                                    placeholder="Jersey #"
                                    value={signInInput.number}
                                    onChange={(e) => setSignInInput({ ...signInInput, number: e.target.value })}
                                    onKeyPress={handleKeyPress}
                                />
                                
                                <div className="grid-2-btn">
                                    <button
                                        onClick={() => addToTeam('blue')}
                                        disabled={!signInInput.name || !signInInput.number}
                                        className="btn-blue"
                                    >
                                        Add Blue
                                    </button>
                                    <button
                                        onClick={() => addToTeam('orange')}
                                        disabled={!signInInput.name || !signInInput.number}
                                        className="btn-orange"
                                    >
                                        Add Orange
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div className="grid-2 mb-8 mt-2">
                            <div>
                                <h3 className="text-blue-600">Blue Team</h3>
                                <div className="space-y-2">
                                    {rosters.home.map((player, i) => (
                                        <div key={i} className="bg-blue-50 p-2 rounded flex justify-between items-center">
                                            <span className="text-xs">#{player.number} {player.name} ({player.team})</span>
                                            <button onClick={() => removePlayer('home', i)} className="btn-danger btn-small">✕</button>
                                        </div>
                                    ))}
                                    {rosters.homeGoalie.name && (
                                        <div className="bg-blue-100 p-2 rounded border">
                                            <p className="text-xs font-semibold mb-0">G: #{rosters.homeGoalie.number} {rosters.homeGoalie.name}</p>
                                        </div>
                                    )}
                                </div>
                            </div>

                            <div>
                                <h3 className="text-orange-600">Orange Team</h3>
                                <div className="space-y-2">
                                    {rosters.away.map((player, i) => (
                                        <div key={i} className="bg-orange-50 p-2 rounded flex justify-between items-center">
                                            <span className="text-xs">#{player.number} {player.name} ({player.team})</span>
                                            <button onClick={() => removePlayer('away', i)} className="btn-danger btn-small">✕</button>
                                        </div>
                                    ))}
                                    {rosters.awayGoalie.name && (
                                        <div className="bg-orange-100 p-2 rounded border">
                                            <p className="text-xs font-semibold mb-0">G: #{rosters.awayGoalie.number} {rosters.awayGoalie.name}</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                        <button
                            onClick={startGame}
                            disabled={rosters.home.length === 0 || rosters.homeGoalie.name === '' || rosters.away.length === 0 || rosters.awayGoalie.name === ''}
                            className="btn-primary"
                        >
                            Start Game
                        </button>
                    </div>
                );
            }

            // GAME TRACKING
            if (screen === 'game') {
                return (
                    <div className="container">
                        <div className="mb-6 flex justify-between items-start">
                            <div>
                                <h2>{gameInfo.homeTeam} vs {gameInfo.awayTeam}</h2>
                                <p className="text-gray-600 text-sm">Game started at {gameInfo.gameStartTime}</p>
                            </div>
                            <button onClick={clearGameData} className="text-xs text-gray-600 btn-danger">New Game</button>
                        </div>

                        <button onClick={startAddGoal} className="btn-primary" style={{padding: '24px', fontSize: '18px', marginBottom: '32px'}}>
                            + Add Goal
                        </button>

                        <div className="border-t">
                            <h3>Goals ({goals.length})</h3>
                            <div className="space-y-3 mb-8">
                                {goals.map((goal, i) => {
                                    const scorer = getRoster(goal.scoringTeam)[goal.scorer];
                                    const assists = goal.assists.map(a => {
                                        if (a === 'goalie') return rosters[`${goal.scoringTeam}Goalie`];
                                        return getRoster(goal.scoringTeam)[a];
                                    });
                                    return (
                                        <div key={i} className="bg-gray-100 p-3 rounded">
                                            <p className="font-semibold text-sm mb-0">{goal.time} - {goal.period}</p>
                                            <p className="text-sm mb-0">#{scorer?.number} {scorer?.name} ({scorer?.team}) - {getTeamName(goal.scoringTeam)}</p>
                                            {assists.length > 0 && (
                                                <p className="text-xs text-gray-600 mt-2 mb-0">
                                                    Assists: {assists.map((a, idx) => {
                                                        const isGoalie = goal.assists[idx] === 'goalie';
                                                        return isGoalie ? `G: #${a.number} ${a.name}` : `#${a.number} ${a.name} (${a.team})`;
                                                    }).join(', ')}
                                                </p>
                                            )}
                                            <div className="flex gap-2 mt-2">
                                                <button onClick={() => editGoal(i)} className="text-xs btn-secondary" style={{padding: '4px 8px', width: 'auto', marginBottom: 0}}>Edit</button>
                                                <button onClick={() => deleteGoal(i)} className="text-xs btn-danger" style={{padding: '4px 8px', width: 'auto', marginBottom: 0}}>Delete</button>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        <button onClick={() => setScreen('summary')} className="btn-secondary">
                            Game Finished
                        </button>

                        {goalStep && (
                            <div className="modal">
                                <div className="modal-content">
                                    {goalStep === 1 && (
                                        <div>
                                            <h2>Goal Time & Period</h2>
                                            <div className="space-y-3">
                                                <input type="tel" placeholder="Time (MM:SS)" value={goalData.time} onChange={(e) => setGoalData({ ...goalData, time: formatTime(e.target.value) })} autoFocus />
                                                <select value={goalData.period} onChange={(e) => setGoalData({ ...goalData, period: e.target.value })}>
                                                    <option value="">Select Period</option>
                                                    <option value="1st">1st</option>
                                                    <option value="2nd">2nd</option>
                                                    <option value="3rd">3rd</option>
                                                </select>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => setGoalStep(null)} className="btn-secondary flex-1">Cancel</button>
                                                <button onClick={() => handleGoalStep(1)} disabled={!goalData.time || !goalData.period} className="btn-primary flex-1">Next</button>
                                            </div>
                                        </div>
                                    )}

                                    {goalStep === 2 && (
                                        <div>
                                            <h2>Which Team?</h2>
                                            <div className="space-y-2">
                                                <button onClick={() => { setGoalData({ ...goalData, scoringTeam: 'home' }); handleGoalStep(2); }} className="btn-secondary">{gameInfo.homeTeam}</button>
                                                <button onClick={() => { setGoalData({ ...goalData, scoringTeam: 'away' }); handleGoalStep(2); }} className="btn-secondary">{gameInfo.awayTeam}</button>
                                            </div>
                                            <button onClick={() => setGoalStep(1)} className="btn-secondary" style={{marginTop: '12px'}}>Back</button>
                                        </div>
                                    )}

                                    {goalStep === 3 && (
                                        <div>
                                            <h2>Who Scored?</h2>
                                            <div className="space-y-2 max-h-60">
                                                {getRoster(goalData.scoringTeam).map((player, i) => (
                                                    <button key={i} onClick={() => { setGoalData({ ...goalData, scorer: i }); handleGoalStep(3); }} className="btn-secondary">
                                                        #{player.number} {player.name} ({player.team})
                                                    </button>
                                                ))}
                                            </div>
                                            <button onClick={() => setGoalStep(2)} className="btn-secondary" style={{marginTop: '12px'}}>Back</button>
                                        </div>
                                    )}

                                    {goalStep === 4 && (
                                        <div>
                                            <h2>Assists (0, 1, or 2)</h2>
                                            <p className="text-sm">#{getRoster(goalData.scoringTeam)[goalData.scorer]?.number} {getRoster(goalData.scoringTeam)[goalData.scorer]?.name}</p>
                                            <div className="space-y-2 max-h-60 mb-4">
                                                {getRoster(goalData.scoringTeam).map((player, i) => {
                                                    if (i === goalData.scorer) return null;
                                                    const isSelected = goalData.assists.includes(i);
                                                    return (
                                                        <button key={i} onClick={() => toggleAssist(i)} style={{background: isSelected ? 'black' : '#f3f3f3', color: isSelected ? 'white' : 'black'}} className="btn-secondary">
                                                            {isSelected ? '✓ ' : ''}#{player.number} {player.name} ({player.team})
                                                        </button>
                                                    );
                                                })}
                                                {rosters[`${goalData.scoringTeam}Goalie`]?.name && (
                                                    <button onClick={() => toggleAssist('goalie')} style={{background: goalData.assists.includes('goalie') ? 'black' : '#f3f3f3', color: goalData.assists.includes('goalie') ? 'white' : 'black'}} className="btn-secondary">
                                                        {goalData.assists.includes('goalie') ? '✓ ' : ''}G: #{rosters[`${goalData.scoringTeam}Goalie`].number} {rosters[`${goalData.scoringTeam}Goalie`].name}
                                                    </button>
                                                )}
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => setGoalStep(3)} className="btn-secondary flex-1">Back</button>
                                                <button onClick={() => handleGoalStep(4)} className="btn-primary flex-1">{editingGoalIndex !== null ? 'Update' : 'Add'}</button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            // SUMMARY
            if (screen === 'summary') {
                return (
                    <div className="container">
                        <button onClick={() => setScreen('game')} className="text-blue-600 mb-4 btn-small" style={{background: 'none', border: 'none', padding: 0}}>← Back</button>

                        <h1>Game Summary</h1>

                        <div className="grid-2 mb-6">
                            <div className="border p-4 rounded text-center">
                                <p className="text-gray-600 mb-0">{gameInfo.homeTeam}</p>
                                <p className="text-4xl font-bold mb-0">{goals.filter(g => g.scoringTeam === 'home').length}</p>
                            </div>
                            <div className="border p-4 rounded text-center">
                                <p className="text-gray-600 mb-0">{gameInfo.awayTeam}</p>
                                <p className="text-4xl font-bold mb-0">{goals.filter(g => g.scoringTeam === 'away').length}</p>
                            </div>
                        </div>

                        <div className="border-t">
                            <h3>Goals ({goals.length})</h3>
                            <div className="space-y-3 mb-8">
                                {goals.map((goal, i) => {
                                    const scorer = getRoster(goal.scoringTeam)[goal.scorer];
                                    const assists = goal.assists.map(a => {
                                        if (a === 'goalie') return rosters[`${goal.scoringTeam}Goalie`];
                                        return getRoster(goal.scoringTeam)[a];
                                    });
                                    return (
                                        <div key={i} className="bg-gray-100 p-3 rounded">
                                            <div className="flex justify-between items-start">
                                                <div>
                                                    <p className="font-semibold text-sm mb-0">{goal.time} - {goal.period}</p>
                                                    <p className="text-sm mb-0">#{scorer?.number} {scorer?.name} ({scorer?.team}) - {getTeamName(goal.scoringTeam)}</p>
                                                    {assists.length > 0 && (
                                                        <p className="text-xs text-gray-600 mt-2 mb-0">
                                                            Assists: {assists.map((a, idx) => {
                                                                const isGoalie = goal.assists[idx] === 'goalie';
                                                                return isGoalie ? `G: #${a.number} ${a.name}` : `#${a.number} ${a.name} (${a.team})`;
                                                            }).join(', ')}
                                                        </p>
                                                    )}
                                                </div>
                                                <button onClick={() => editGoal(i)} className="text-gray-600">✎</button>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        <button onClick={() => setScreen('gameSheet')} className="btn-primary">Generate Game Sheet</button>
                    </div>
                );
            }

            // GAME SHEET
            if (screen === 'gameSheet') {
                const homeGoals = goals.filter(g => g.scoringTeam === 'home');
                const awayGoals = goals.filter(g => g.scoringTeam === 'away');

                const getPlayerStats = (team) => {
                    const stats = {};
                    getRoster(team).forEach((player, i) => {
                        stats[i] = { goals: 0, assists: 0, points: 0 };
                    });
                    
                    const teamGoals = goals.filter(g => g.scoringTeam === team);
                    teamGoals.forEach(goal => {
                        stats[goal.scorer].goals += 1;
                        stats[goal.scorer].points += 1;
                        goal.assists.forEach(assist => {
                            if (assist !== 'goalie') {
                                stats[assist].assists += 1;
                                stats[assist].points += 1;
                            }
                        });
                    });
                    
                    return stats;
                };

                const homeStats = getPlayerStats('home');
                const awayStats = getPlayerStats('away');

                return (
                    <div className="container">
                        <button onClick={() => setScreen('summary')} className="text-blue-600 mb-4 btn-small" style={{background: 'none', border: 'none', padding: 0}}>← Back</button>

                        <div className="text-center mb-6">
                            <h1>Game Sheet</h1>
                            <p className="text-gray-600 text-sm">{new Date().toLocaleDateString()} | {gameInfo.gameStartTime}</p>
                        </div>

                        <div className="text-center mb-6">
                            <p className="text-4xl font-bold">{homeGoals.length} - {awayGoals.length}</p>
                        </div>

                        <div className="grid-2 mb-8 text-sm">
                            <div style={{borderRight: '1px solid #e5e5e5', paddingRight: '16px'}}>
                                <h2>{gameInfo.homeTeam}</h2>
                                <table>
                                    <thead>
                                        <tr>
                                            <th>#</th>
                                            <th>Player</th>
                                            <th className="text-center-col">G</th>
                                            <th className="text-center-col">A</th>
                                            <th className="text-center-col">Pts</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {rosters.home.map((player, i) => (
                                            <tr key={i}>
                                                <td>{player.number}</td>
                                                <td className="truncate">{player.name}</td>
                                                <td className="text-center-col">{homeStats[i]?.goals || 0}</td>
                                                <td className="text-center-col">{homeStats[i]?.assists || 0}</td>
                                                <td className="text-center-col">{homeStats[i]?.points || 0}</td>
                                            </tr>
                                        ))}
                                        <tr style={{fontWeight: 'bold', background: '#fafafa'}}>
                                            <td>{rosters.homeGoalie.number}</td>
                                            <td className="truncate">G: {rosters.homeGoalie.name}</td>
                                            <td className="text-center-col">0</td>
                                            <td className="text-center-col">{goals.filter(g => g.scoringTeam === 'home' && g.assists.includes('goalie')).length}</td>
                                            <td className="text-center-col">{goals.filter(g => g.scoringTeam === 'home' && g.assists.includes('goalie')).length}</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>

                            <div style={{paddingLeft: '16px'}}>
                                <h2>{gameInfo.awayTeam}</h2>
                                <table>
                                    <thead>
                                        <tr>
                                            <th>#</th>
                                            <th>Player</th>
                                            <th className="text-center-col">G</th>
                                            <th className="text-center-col">A</th>
                                            <th className="text-center-col">Pts</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {rosters.away.map((player, i) => (
                                            <tr key={i}>
                                                <td>{player.number}</td>
                                                <td className="truncate">{player.name}</td>
                                                <td className="text-center-col">{awayStats[i]?.goals || 0}</td>
                                                <td className="text-center-col">{awayStats[i]?.assists || 0}</td>
                                                <td className="text-center-col">{awayStats[i]?.points || 0}</td>
                                            </tr>
                                        ))}
                                        <tr style={{fontWeight: 'bold', background: '#fafafa'}}>
                                            <td>{rosters.awayGoalie.number}</td>
                                            <td className="truncate">G: {rosters.awayGoalie.name}</td>
                                            <td className="text-center-col">0</td>
                                            <td className="text-center-col">{goals.filter(g => g.scoringTeam === 'away' && g.assists.includes('goalie')).length}</td>
                                            <td className="text-center-col">{goals.filter(g => g.scoringTeam === 'away' && g.assists.includes('goalie')).length}</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <div className="border-t mb-6">
                            <h2>Goal Log</h2>
                            <div className="space-y-2 text-sm">
                                {goals.map((goal, i) => {
                                    const scorer = getRoster(goal.scoringTeam)[goal.scorer];
                                    const assists = goal.assists.map(a => {
                                        if (a === 'goalie') return rosters[`${goal.scoringTeam}Goalie`];
                                        return getRoster(goal.scoringTeam)[a];
                                    });
                                    return (
                                        <div key={i} className="bg-gray-100 p-2 rounded">
                                            <p className="font-semibold mb-0">{goal.time} - {goal.period}</p>
                                            <p className="mb-0">#{scorer?.number} <strong>{scorer?.name}</strong> ({scorer?.team}) - {getTeamName(goal.scoringTeam)}</p>
                                            {assists.length > 0 && (
                                                <p className="text-xs text-gray-600 mb-0">
                                                    A: {assists.map((a, idx) => {
                                                        const isGoalie = goal.assists[idx] === 'goalie';
                                                        return isGoalie ? `G: #${a.number} ${a.name}` : `#${a.number} ${a.name} (${a.team})`;
                                                    }).join(', ')}
                                                </p>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        <button onClick={() => window.print()} className="btn-secondary mb-4">Print</button>
                        <button onClick={() => { if (window.confirm('Start a new game?')) clearGameData(); }} className="btn-primary">New Game</button>
                    </div>
                );
            }
        }

        ReactDOM.render(<HockeyGameTracker />, document.getElementById('root'));
    </script>
</body>
</html>
